<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LADYBUGNODES V(5) · Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0a0b0e;
      --surface: #111318;
      --surface2: #181c22;
      --border: #1e242e;
      --red: #ff3b5c;
      --red-dim: rgba(255,59,92,0.12);
      --green: #00e676;
      --green-dim: rgba(0,230,118,0.10);
      --amber: #ffab40;
      --amber-dim: rgba(255,171,64,0.12);
      --blue: #40c4ff;
      --blue-dim: rgba(64,196,255,0.10);
      --purple: #b388ff;
      --purple-dim: rgba(179,136,255,0.10);
      --gold: #ffd700;
      --gold-dim: rgba(255,215,0,0.12);
      --muted: #4a5568;
      --text: #e2e8f0;
      --text-dim: #718096;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Syne', sans-serif;
      --radius: 12px;
    }
    
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
    }
    
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,59,92,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,59,92,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    
    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      background: rgba(10,11,14,0.92);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      flex-wrap: wrap;
    }
    
    .logo { display: flex; align-items: center; gap: 14px; }
    
    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--red-dim);
      border: 1px solid rgba(255,59,92,0.3);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 24px rgba(255,59,92,0.25);
    }
    
    .logo-text h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
    .logo-text h1 span { color: var(--red); }
    .logo-text p { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 3px; }
    
    .nav-tabs { display: flex; gap: 4px; }
    
    .nav-tab {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    
    .nav-tab:hover { background: var(--surface2); color: var(--text); }
    .nav-tab.active { background: var(--red-dim); border-color: rgba(255,59,92,0.3); color: var(--red); }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .user-avatar {
      width: 36px;
      height: 36px;
      background: var(--purple-dim);
      border: 1px solid rgba(179,136,255,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    
    .user-coins {
      background: var(--gold-dim);
      border: 1px solid rgba(255,215,0,0.3);
      padding: 6px 12px;
      border-radius: 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--gold);
    }
    
    /* Main Content */
    main { padding: 32px 0; }
    
    .page-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    
    .page-subtitle {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 32px;
    }
    
    /* Profile Card */
    .profile-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
    }
    
    @media (max-width: 768px) {
      .profile-grid { grid-template-columns: 1fr; }
    }
    
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    
    .profile-avatar-section {
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--red-dim), var(--purple-dim));
      border: 3px solid var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 16px;
    }
    
    .profile-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .profile-role {
      display: inline-block;
      padding: 4px 12px;
      background: var(--purple-dim);
      border: 1px solid rgba(179,136,255,0.3);
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .profile-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .stat-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--green);
      font-family: var(--font-mono);
    }
    
    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    
    /* Form Styles */
    .form-section {
      margin-bottom: 24px;
    }
    
    .form-section:last-child { margin-bottom: 0; }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--red);
      border-radius: 2px;
    }
    
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    
    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }
    
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      transition: border-color 0.2s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--red);
    }
    
    .form-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
    }
    
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }
    
    .btn-primary {
      background: var(--red);
      color: white;
    }
    
    .btn-primary:hover {
      background: #e63552;
      box-shadow: 0 4px 16px rgba(255,59,92,0.3);
    }
    
    .btn-secondary {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--text);
    }
    
    .btn-secondary:hover {
      background: var(--surface);
      border-color: var(--red);
    }
    
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    /* Activity Section */
    .activity-list {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    
    .activity-item:last-child { border-bottom: none; }
    
    .activity-icon {
      width: 32px;
      height: 32px;
      background: var(--blue-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .activity-content { flex: 1; }
    
    .activity-title {
      font-size: 13px;
      margin-bottom: 2px;
    }
    
    .activity-time {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 24px;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .toast.success {
      background: var(--green-dim);
      border: 1px solid rgba(0,230,118,0.3);
      color: var(--green);
    }
    
    .toast.error {
      background: var(--red-dim);
      border: 1px solid rgba(255,59,92,0.3);
      color: var(--red);
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }
  </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <div class="logo-icon">🐞</div>
          <div class="logo-text">
            <h1>LADYBUG<span>NODES</span></h1>
            <p>V(5) · PROFILE</p>
          </div>
        </a>
        
        <nav class="nav-tabs">
          <a href="index.html" class="nav-tab">Dashboard</a>
          <a href="panel-bots.html" class="nav-tab">Bots</a>
          <a href="profile.html" class="nav-tab active">Profile</a>
          <a href="settings.html" class="nav-tab">Settings</a>
        </nav>
        
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-coins" id="userCoins">0 coins</div>
        </div>
      </div>
    </div>
  </header>
  
  <main>
    <div class="container">
      <h2 class="page-title">👤 User Profile</h2>
      <p class="page-subtitle">Manage your personal information and view your activity</p>
      
      <div class="profile-grid">
        <!-- Left Column - Avatar & Stats -->
        <div class="profile-card">
          <div class="profile-avatar-section">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <div class="profile-name" id="profileName">Loading...</div>
            <span class="profile-role" id="profileRole">user</span>
          </div>
          
          <div class="profile-stats">
            <div class="stat-item">
              <div class="stat-value" id="statCoins">0</div>
              <div class="stat-label">Coins</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statBots">0</div>
              <div class="stat-label">Bots</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statSessions">0</div>
              <div class="stat-label">Sessions</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statDays">0</div>
              <div class="stat-label">Days Active</div>
            </div>
          </div>
        </div>
        
        <!-- Right Column - Edit Profile -->
        <div class="profile-card">
          <form id="profileForm">
            <div class="form-section">
              <h3 class="section-title">Personal Information</h3>
              
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Username</label>
                  <input type="text" class="form-input" id="inputUsername" disabled>
                </div>
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-input" id="inputEmail" placeholder="Enter your email">
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" class="form-input" id="inputPhone" placeholder="e.g., 263786831019">
                </div>
                <div class="form-group">
                  <label class="form-label">Timezone</label>
                  <select class="form-input" id="inputTimezone">
                    <option value="Africa/Harare">Africa/Harare (CAT)</option>
                    <option value="UTC">UTC</option>
                    <option value="America/New_York">America/New_York (EST)</option>
                    <option value="America/Los_Angeles">America/Los_Angeles (PST)</option>
                    <option value="Europe/London">Europe/London (GMT)</option>
                    <option value="Europe/Paris">Europe/Paris (CET)</option>
                    <option value="Asia/Tokyo">Asia/Tokyo (JST)</option>
                    <option value="Asia/Dubai">Asia/Dubai (GST)</option>
                  </select>
                </div>
              </div>
            </div>
            
            <div class="form-section">
              <h3 class="section-title">Security</h3>
              
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" id="inputCurrentPassword" placeholder="Enter current password to change">
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">New Password</label>
                  <input type="password" class="form-input" id="inputNewPassword" placeholder="Enter new password">
                </div>
                <div class="form-group">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" class="form-input" id="inputConfirmPassword" placeholder="Confirm new password">
                </div>
              </div>
            </div>
            
            <div class="btn-group">
              <button type="submit" class="btn btn-primary">💾 Save Changes</button>
              <button type="button" class="btn btn-secondary" onclick="loadProfile()">↻ Reset</button>
            </div>
          </form>
        </div>
      </div>
      
      <!-- Activity Log -->
      <div class="profile-card" style="margin-top: 24px;">
        <h3 class="section-title">Recent Activity</h3>
        <div class="activity-list" id="activityList">
          <div class="loading">Loading activity...</div>
        </div>
      </div>
    </div>
  </main>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const API = window.location.origin;
    let token = localStorage.getItem('token');
    let userData = null;
    
    // Check auth
    if (!token) {
      window.location.href = 'login.html';
    }
    
    // Load profile data
    async function loadProfile() {
      try {
        const res = await fetch(`${API}/api/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!res.ok) {
          if (res.status === 401) {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
          }
          throw new Error('Failed to load profile');
        }
        
        userData = await res.json();
        updateUI();
      } catch (err) {
        showToast('Failed to load profile: ' + err.message, 'error');
      }
    }
    
    // Load statistics
    async function loadStats() {
      try {
        // Load bots count
        const botsRes = await fetch(`${API}/api/panel-bots`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const botsData = await botsRes.json();
        document.getElementById('statBots').textContent = botsData.bots?.length || 0;
        
        // Load sessions count
        const sessionsRes = await fetch(`${API}/api/sessions`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const sessionsData = await sessionsRes.json();
        document.getElementById('statSessions').textContent = sessionsData.sessions?.length || 0;
        
        // Load activity
        const activityRes = await fetch(`${API}/api/user/activity`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const activityData = await activityRes.json();
        renderActivity(activityData.activities || []);
        
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }
    
    // Update UI with user data
    function updateUI() {
      if (!userData) return;
      
      // Header
      document.getElementById('userAvatar').textContent = userData.username.charAt(0).toUpperCase();
      document.getElementById('userCoins').textContent = `${userData.coins?.toLocaleString() || 0} coins`;
      
      // Profile card
      document.getElementById('profileAvatar').textContent = userData.username.charAt(0).toUpperCase();
      document.getElementById('profileName').textContent = userData.username;
      document.getElementById('profileRole').textContent = userData.role;
      document.getElementById('statCoins').textContent = userData.coins?.toLocaleString() || 0;
      
      // Form
      document.getElementById('inputUsername').value = userData.username;
      document.getElementById('inputEmail').value = userData.email || '';
      document.getElementById('inputPhone').value = userData.phone || '';
      document.getElementById('inputTimezone').value = userData.timezone || 'Africa/Harare';
      
      // Days active
      if (userData.createdAt) {
        const days = Math.floor((Date.now() - new Date(userData.createdAt)) / (1000 * 60 * 60 * 24));
        document.getElementById('statDays').textContent = days;
      }
    }
    
    // Render activity log
    function renderActivity(activities) {
      const container = document.getElementById('activityList');
      
      if (activities.length === 0) {
        container.innerHTML = '<div class="loading">No recent activity</div>';
        return;
      }
      
      container.innerHTML = activities.map(a => `
        <div class="activity-item">
          <div class="activity-icon">${getActivityIcon(a.type)}</div>
          <div class="activity-content">
            <div class="activity-title">${a.action}</div>
            <div class="activity-time">${formatTime(a.timestamp)}</div>
          </div>
        </div>
      `).join('');
    }
    
    function getActivityIcon(type) {
      const icons = {
        login: '🔓',
        logout: '🔒',
        bot_start: '▶️',
        bot_stop: '⏹️',
        session_create: '➕',
        coins_add: '💰',
        settings: '⚙️',
        default: '📋'
      };
      return icons[type] || icons.default;
    }
    
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)} min ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)} hours ago`;
      return date.toLocaleDateString();
    }
    
    // Save profile
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('inputEmail').value;
      const phone = document.getElementById('inputPhone').value;
      const timezone = document.getElementById('inputTimezone').value;
      const currentPassword = document.getElementById('inputCurrentPassword').value;
      const newPassword = document.getElementById('inputNewPassword').value;
      const confirmPassword = document.getElementById('inputConfirmPassword').value;
      
      // Validate password change
      if (newPassword || currentPassword) {
        if (!currentPassword) {
          showToast('Enter your current password to change it', 'error');
          return;
        }
        if (newPassword !== confirmPassword) {
          showToast('New passwords do not match', 'error');
          return;
        }
        if (newPassword.length < 6) {
          showToast('Password must be at least 6 characters', 'error');
          return;
        }
      }
      
      try {
        const res = await fetch(`${API}/api/user/profile`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            email,
            phone,
            timezone,
            currentPassword,
            newPassword: newPassword || undefined
          })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Failed to update profile');
        }
        
        showToast('Profile updated successfully!', 'success');
        loadProfile();
        
        // Clear password fields
        document.getElementById('inputCurrentPassword').value = '';
        document.getElementById('inputNewPassword').value = '';
        document.getElementById('inputConfirmPassword').value = '';
        
      } catch (err) {
        showToast('Failed to update: ' + err.message, 'error');
      }
    });
    
    // Show toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // Logout
    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }
    
    // Initialize
    loadProfile();
    loadStats();
  </script>
</body>
</html>
