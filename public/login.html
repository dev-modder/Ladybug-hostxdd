<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LADYBUGNODES V(5) · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0b0e;
      --surface:  #111318;
      --surface2: #181c22;
      --border:   #1e242e;
      --red:      #ff3b5c;
      --red-dim:  rgba(255,59,92,0.12);
      --green:    #00e676;
      --green-dim:rgba(0,230,118,0.10);
      --amber:    #ffab40;
      --blue:     #40c4ff;
      --purple:   #b388ff;
      --muted:    #4a5568;
      --text:     #e2e8f0;
      --text-dim: #718096;
      --font-mono: 'JetBrains Mono', monospace;
      --font-sans: 'Syne', sans-serif;
      --radius:   14px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,59,92,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,59,92,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 48px 48px; }
    }

    /* Glow orbs */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,59,92,0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    @keyframes orbFloat {
      0%   { transform: translate(0,0); }
      100% { transform: translate(60px,80px); }
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 60px rgba(255,59,92,0.08), 0 24px 48px rgba(0,0,0,0.4);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--purple), var(--blue));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: var(--red-dim);
      border: 1px solid rgba(255,59,92,0.3);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 24px rgba(255,59,92,0.25);
      animation: pulse-red 3s ease-in-out infinite;
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 16px rgba(255,59,92,0.2); }
      50%       { box-shadow: 0 0 32px rgba(255,59,92,0.45); }
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .logo-text h1 span { color: var(--red); }
    .logo-text p {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      margin-top: 3px;
      letter-spacing: 0.05em;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
      font-family: var(--font-mono);
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-family: var(--font-mono);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,59,92,0.08);
    }
    .form-input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--red), #c4002b);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,59,92,0.1);
      border: 1px solid rgba(255,59,92,0.25);
      border-radius: 8px;
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 10px 14px;
      margin-top: 16px;
      display: none;
    }
    .error-msg.show { display: block; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .footer-note a { color: var(--red); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🐞</div>
    <div class="logo-text">
      <h1>LADYBUG<span>NODES</span></h1>
      <p>multi-host · whatsapp bots</p>
    </div>
  </div>

  <div class="login-title">Welcome back</div>
  <div class="login-sub">Sign in to your dashboard</div>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-input" id="username" placeholder="admin" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    <div class="error-msg" id="error-msg"></div>
  </form>

  <div style="text-align: center; margin-top: 16px; font-size: 13px;">
    <a href="reset-password.html" style="color: var(--blue); text-decoration: none;">Forgot password?</a>
    &nbsp;•&nbsp;
    <a href="signup.html" style="color: var(--green); text-decoration: none;">Sign up</a>
  </div>

  <div class="footer-note">
    LADYBUGNODES <span style="color:var(--red)">V(5)</span> &nbsp;•&nbsp; Powered by <a href="https://render.com" target="_blank">Render.com</a>
  </div>
</div>

<script>
  // If already logged in, redirect
  const token = localStorage.getItem('lbn_token');
  if (token) location.href = '/';

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.classList.remove('show');

    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const d = await r.json();
      if (!r.ok || !d.ok) {
        err.textContent = d.error || 'Login failed';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }
      localStorage.setItem('lbn_token', d.token);
      localStorage.setItem('lbn_user', JSON.stringify(d.user));
      location.href = '/';
    } catch (ex) {
      err.textContent = 'Network error: ' + ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
